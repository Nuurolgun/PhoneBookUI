<mat-toolbar color="primary" style="display: flex; justify-content: space-between;">
  <div style="display: flex; align-items: center; gap: 20px;">
    <span style="font-weight: bold; font-size: 20px;">{{ 'TITLE' | translate }}</span>
    
    @if (!isLoading) {
      <span style="font-size: 14px; opacity: 0.9;">({{ 'RECORD_COUNT' | translate }}: {{ rows.length }})</span>
    }
  </div>

  <div style="display: flex; gap: 10px; align-items: center;">
    <button mat-raised-button (click)="openCreate()">{{ 'NEW_CONTACT' | translate }}</button>
    
    <span style="opacity: 0.5; margin: 0 5px;">|</span>
    
    <button mat-button (click)="changeLanguage('tr')" style="min-width: 40px;">TR</button>
    <button mat-button (click)="changeLanguage('en')" style="min-width: 40px;">EN</button>
  </div>
</mat-toolbar>

<div style="padding: 20px;">
  
  @if (isLoading) {
    <div style="text-align: center; margin-top: 50px; font-size: 16px; color: #666;">
      {{ 'LOADING' | translate }}
    </div>
  }

  @else {
    <ag-grid-angular 
      style="width: 100%; height: 600px;" 
      class="ag-theme-alpine"
      theme="legacy"
      [rowData]="rows" 
      [columnDefs]="colDefs"
      [defaultColDef]="defaultColDef">
    </ag-grid-angular>
  }
  
</div>
